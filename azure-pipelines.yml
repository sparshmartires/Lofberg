trigger:
  branches:
    include:
      - main
      - development

pr:
  branches:
    include:
      - main
      - development

variables:
  nodeVersion: '20.x'
  serviceConnection: 'sc-lofberg-dev'
  webAppName: 'app-lofberg-dev-frontend'
  resourceGroupName: 'rg-lofberg-dev'
  NEXT_PUBLIC_API_URL: 'https://app-lofberg-dev-backend.azurewebsites.net'

stages:

# ─────────────────────────────────────────
# STAGE 1: BUILD & TEST
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildAndTest
    displayName: 'Build and Run Tests'
    pool:
      name: 'LocalAgent'

    steps:

    # Step 1: Use Node.js 20
    - task: NodeTool@0
      displayName: 'Use Node.js 20'
      inputs:
        versionSpec: '$(nodeVersion)'

    # Step 2: Install dependencies
    - script: npm ci
      displayName: 'Install Dependencies'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

    # Step 3: Set environment variables for build
    - script: |
        echo "NEXT_PUBLIC_API_URL=$(NEXT_PUBLIC_API_URL)" >> .env.production
      displayName: 'Set Environment Variables'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

    # Step 4: Build Next.js app
    - script: npm run build
      displayName: 'Build Next.js App'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

    # Step 5: DEBUG - List zip contents to verify structure
    - script: |
        echo "=== Working directory ==="
        echo $(System.DefaultWorkingDirectory)
        echo "=== Files in working directory ==="
        dir $(System.DefaultWorkingDirectory)
        echo "=== Checking .next folder ==="
        dir $(System.DefaultWorkingDirectory)\.next
      displayName: 'DEBUG: Check build output'

    # Step 6: Create deployment package
    - task: ArchiveFiles@2
      displayName: 'Package Build Output'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
        replaceExistingArchive: true
        excludePaths: |
          .git
          node_modules/.cache
          **/*.test.*
          **/*.spec.*

    # Step 7: DEBUG - Verify zip contents
    - script: |
        powershell -Command "Add-Type -AssemblyName System.IO.Compression.FileSystem; $zip = [System.IO.Compression.ZipFile]::OpenRead('$(Build.ArtifactStagingDirectory)/frontend.zip'); Write-Host 'Total files in zip:' $zip.Entries.Count; $zip.Entries | Select-Object -First 40 | ForEach-Object { $_.FullName }; $zip.Dispose()"
      displayName: 'DEBUG: List zip contents'

    # Step 8: Upload build artifact for next stage
    - task: PublishBuildArtifacts@1
      displayName: 'Upload Build Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'lofberg-frontend-drop'
        publishLocation: 'Container'

# ─────────────────────────────────────────
# STAGE 2: DEPLOY TO AZURE APP SERVICE
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployToAppService
    displayName: 'Deploy to App Service'
    pool:
      name: 'LocalAgent'
    environment: 'dev'

    strategy:
      runOnce:
        deploy:
          steps:

          # Step 1: Download the artifact from Build stage
          - task: DownloadBuildArtifacts@1
            displayName: 'Download Build Artifact'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'lofberg-frontend-drop'
              downloadPath: '$(System.ArtifactsDirectory)'

          # Step 2: Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service'
            inputs:
              azureSubscription: '$(serviceConnection)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              resourceGroupName: '$(resourceGroupName)'
              package: '$(System.ArtifactsDirectory)/lofberg-frontend-drop/frontend.zip'
              deploymentMethod: 'zipDeploy'
              startUpCommand: 'node node_modules/next/dist/bin/next start -p 8080'

          # Step 3: Set Frontend App Settings
          - task: AzureAppServiceSettings@1
            displayName: 'Set Frontend App Settings'
            inputs:
              azureSubscription: '$(serviceConnection)'
              appName: '$(webAppName)'
              resourceGroupName: '$(resourceGroupName)'
              appSettings: |
                [
                  {
                    "name": "NEXT_PUBLIC_API_URL",
                    "value": "$(NEXT_PUBLIC_API_URL)",
                    "slotSetting": false
                  },
                  {
                    "name": "WEBSITE_RUN_FROM_PACKAGE",
                    "value": "0",
                    "slotSetting": false
                  }
                ]